  <text class="folio" x="300" y="100">SIN ALGORITMO</text>
  <text class="h" x="300" y="150">El género es una mentira.</text><text class="b" x="300" y="196">Las etiquetas separan cosas que en realidad conviven y</text><text class="b" x="300" y="226">conversan. Hay techno que medita y techno que detona. Hay</text><text class="b" x="300" y="256">jazz de las tres de la mañana y jazz que es una pared de ruido.</text><text class="b" x="300" y="286"></text><text class="b" x="300" y="316">El Fader de Gradiente atraviesa los géneros. De glacial a</text><text class="b" x="300" y="346">volcán, mueves la energía y todo se reacomoda a esa</text><text class="b" x="300" y="376">intensidad. Ubicas cada cosa por cómo se siente, no por una</text><text class="b" x="300" y="406">sola etiqueta ni por un bueno o malo.</text><text class="b" x="300" y="436"></text><text class="b" x="300" y="466">A esto le llamamos calibración analógica: tu subjetividad</text><text class="b" x="300" y="496">ubica, y entre muchas manos cada cosa cae en su nicho.</text>
